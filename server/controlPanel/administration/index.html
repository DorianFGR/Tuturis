<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Tuturis | Admin | Control Panel</title>
    <link rel="stylesheet" href="../styles/board.css" />
</head>
<body>

<div class="topbar">
    <div class="accountLogo">
        <a href="https://oversim.ovh"><img src="https://oversim.ovh/img/logo_oversim.webp" alt="Logo"></a>
    </div>
    <div class="user-menu">
        <div class="username" onclick="toggleDropdown()">
            <img src="img/user.webp" alt="User Avatar">
        </div>
        <div class="dropdown" id="dropdown">
            <a href="/administration/users">Users</a>
            <a href="/administration/connections">My account</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="box">
        <div class="box-title">Users</div>
        <a href="/administration/users"><button class="box-button">See</button></a>
    </div>
    <div class="box">
        <div class="box-title">Connections</div>
        <div class="box-content"><?php echo $mail ?></div>
        <a href="/administration/connections"><button class="box-button">See</button></a>
    </div>
</div>

<script>
    function toggleDropdown() {
        document.getElementById("dropdown").classList.toggle("show");
    }

    window.onclick = function(event) {
        if (!event.target.closest('.username')) {
            var dropdowns = document.getElementsByClassName("dropdown");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    }

</script>
</body>
</html>
