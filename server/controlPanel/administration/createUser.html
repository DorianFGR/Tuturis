<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tuturis | Admin | Create User</title>
    <link rel="stylesheet" href="../styles/administration.css">
</head>
<body>

<div class="createUser" id="createUser" style="display: block;">
    <div class="createUserForm">
        <h2>Create a new user</h2>
        <form id="createUserForm" action="administration/createUserAttempt" method="POST">
            <input type="hidden" name="createUser" value="createUser">
            <input type="text" placeholder="username" id="username" name="username" required>
            <input type="text" placeholder="password" id="password" name="password" required>
            <input type="text" placeholder="mail" id="mail" name="mail">
            <input type="submit" value="Submit" name="Add User">
            <button class="createUser"><a href="../">Back</a></button>
        </form>
    </div>
</div>

</body>
</html>
