<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Tuturis | Control Panel</title>
    <link rel="stylesheet" href="styles/board.css" />
</head>
<body>

<div class="topbar">
    <div class="accountLogo">
        <a href="https://oversim.ovh"><img src="https://oversim.ovh/img/logo_oversim.webp" alt="Logo"></a>
    </div>
    <div class="user-menu">
        <div class="username" onclick="toggleDropdown()">
            <img src="img/user.webp" alt="User Avatar">
        </div>
        <div class="dropdown" id="dropdown">
            <a href="/passwords">My Passwords</a>
            <a href="/account">My account</a>
            <a href="/security">Security Settings</a>
            <a href="/activity">Recent Activity</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="box">
        <div class="box-title">Passwords</div>
        <a href="/passwords"><button class="box-button">See</button></a>
    </div>
    <div class="box">
        <div class="box-title">Account</div>
        <div class="box-content"><?php echo htmlspecialchars($mail); ?></div>
        <a href="/account"><button class="box-button">See</button></a>
    </div>
    <div class="box">
        <div class="box-title">Security Settings</div>
        <a href="/userSettings"><button class="box-button">See</button></a>
    </div>
    <div class="box">
        <div class="box-title">Recent Activity</div>
        <a href="/activity"><button class="box-button">See</button></a>
    </div>
</div>

<script>
    function toggleDropdown() {
        document.getElementById("dropdown").classList.toggle("show");
    }

    window.onclick = function(event) {
        if (!event.target.closest('.username')) {
            var dropdowns = document.getElementsByClassName("dropdown");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    }

</script>
</body>
</html>
